# This workflow will install Python dependencies and run the script

name: Run script

on:
  workflow_dispatch: # add run button in github
  schedule:
    - cron: "15 8 * * *"


jobs:
  run:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hapirestore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --name postgres-container

    steps:
      - name: Install latest PostgreSQL client tools
        run: |
          sudo apt install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt purge -y postgresql-client-common
          sudo apt install -y postgresql-client

      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Run script
        env:
          HDX_SITE: ${{ vars.HDX_SITE }}
          HDX_KEY: ${{ secrets.HDX_BOT_SCRAPERS_API_TOKEN }}
          PREPREFIX: ${{ vars.HDX_USER_AGENT_PREPREFIX }}
          USER_AGENT: ${{ vars.USER_AGENT }}

        # 'uv run' executes the command inside the environment created by 'uv sync'
        run: |
          uv run --frozen python -m hdx.scraper.hapi --restore_url=https://github.com/OCHA-DAP/hapi-pipelines/raw/refs/heads/db-export/database/hapi_db.pg_restore -db "postgresql+psycopg://postgres:postgres@localhost:5432/hapirestore"

      - name: Send mail
        if: failure()
        uses: dawidd6/action-send-mail@v7
        with:
          server_address: ${{secrets.HDX_PIPELINE_EMAIL_SERVER}}
          server_port: ${{secrets.HDX_PIPELINE_EMAIL_PORT}}
          username: ${{secrets.HDX_PIPELINE_EMAIL_USERNAME}}
          password: ${{secrets.HDX_PIPELINE_EMAIL_PASSWORD}}
          subject: "FAILED: ${{github.repository}} run job"
          body: GitHub Actions run job for ${{github.repository}} failed!
          to: ${{vars.HDX_PIPELINE_EMAIL_LIST}}
          from: ${{secrets.HDX_PIPELINE_EMAIL_FROM}}
          content_type: text/html

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
